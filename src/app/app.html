<h2>Employee CRUD</h2>

<input [(ngModel)]="emp.name" placeholder="Name">
<input [(ngModel)]="emp.department" placeholder="Department">
<button (click)="addEmployee()">Add</button>

<hr>

<ul>
  <li *ngFor="let e of employees">
    {{e.name}} - {{e.department}}
    <button (click)="deleteEmployee(e.id)">Delete</button>
  </li>
</ul>
